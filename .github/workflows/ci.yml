name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default: workflow only needs to read the repo checkout.
permissions:
  contents: read

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests (Bun)
        run: bun run test

      - name: Worker tests (vitest-pool-workers)
        run: bun run test:workers

      - name: Dashboard (typecheck, test, build)
        run: |
          cd apps/dashboard
          bun run typecheck
          bun run test
          bunx vite build

      - name: Lint (Biome)
        run: bun run lint
