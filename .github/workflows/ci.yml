name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests (Bun)
        run: bun run test

      - name: Worker tests (vitest-pool-workers)
        run: bun run test:workers
